<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Openeer - 開業準備経費マネージャー</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
                    }

        }

    <style>
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const generateSafeId = () => {
            try {
                if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
                    return crypto.randomUUID();
                }
            } catch (e) {}
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        };

        const getLocalStorageItem = (key, fallback) => {
            try {
                const item = localStorage.getItem(key);
                return item ? JSON.parse(item) : fallback;
            } catch (e) {
                console.warn("LocalStorage access restricted:", e);
                return fallback;
            }
        };

        const setLocalStorageItem = (key, value) => {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                console.warn("LocalStorage write restricted:", e);
            }
        };

        const getSessionStorageItem = (key, fallback) => {
            try {
                const item = sessionStorage.getItem(key);
                return item ? JSON.parse(item) : fallback;
            } catch (e) {
                return fallback;
            }
        };

        const setSessionStorageItem = (key, value) => {
            try {
                sessionStorage.setItem(key, JSON.stringify(value));
            } catch (e) {}
        };

        const SVGIcon = ({ name, className = "w-5 h-5", ...props }) => {
            const icons = {
                Plus: <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />,

                CheckCircle2: <path strokeLinecap="round" strokeLinejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />,
                X: <path strokeLinecap="round" strokeLinejoin="round" d="M6 18 18 6M6 6l12 12" />,

                FolderPlus: <path strokeLinecap="round" strokeLinejoin="round" d="M12 10.5v6m3-3h-6M2.25 12V4.5A2.25 2.25 0 0 1 4.5 2.25h4.123c.53 0 1.042.203 1.432.564l1.686 1.564c.39.36.902.564 1.432.564H19.5M21.75 7.5v9a2.25 2.25 0 0 1-2.25 2.25h-15A2.25 2.25 0 0 1 2.25 16.5v-4.5Z" />,

                Info: <path strokeLinecap="round" strokeLinejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 111.086 1.042l-1.35 1.62a.75.75 0 01-1.086-.02l-.041-.02a.75.75 0 01.02-1.086l1.35-1.62a.75.75 0 011.08-.02zM12 8.25a.75.75 0 100-1.5.75.75 0 000 1.5zM21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
                Database: <path strokeLinecap="round" strokeLinejoin="round" d="M20.25 6.375c0 2.278-3.694 4.125-8.25 4.125S3.75 8.653 3.75 6.375m16.5 0c0-2.278-3.694-4.125-8.25-4.125S3.75 4.097 3.75 6.375m16.5 0v11.25c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125V6.375m16.5 0v3.75c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125v-3.75m16.5 3.75v3.75c0 2.278-3.694 4.125-8.25 4.125s-8.25-1.847-8.25-4.125v-3.75" />,
                CloudLightning: <path strokeLinecap="round" strokeLinejoin="round" d="M12 3v1.5M12 18.75V21M4.75 12h1.5m11.5 0h1.5M6.375 6.375l1.06 1.06m8.13 8.13l1.06 1.06m0-10.25l-1.06 1.06m-8.13 8.13l-1.06 1.06" />,
                RefreshCw: <path strokeLinecap="round" strokeLinejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />,
                TrendingUp: <path strokeLinecap="round" strokeLinejoin="round" d="M2.25 18 9 11.25l4.5 4.5 6.75-6.75M19.5 8.25h3v3" />,
                FileSpreadsheet: <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5A3.375 3.375 0 0 0 10.125 2.25H3.75A2.25 2.25 0 0 0 1.5 4.5v15a2.25 2.25 0 0 0 2.25 2.25h16.5A2.25 2.25 0 0 0 22.5 19.5v-5.25Z" />
            };

            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    fill="none" 
                    viewBox="0 0 24 24" 
                    strokeWidth="2" 
                    stroke="currentColor" 
                    className={className}
                    {...props}
                >
                    {icons[name] || null}
                </svg>
            );
        };

        const getWeekday = (dateStr) => {
            if (!dateStr) return '';
            const date = new Date(dateStr.replace(/-/g, '/'));
            if (isNaN(date.getTime())) return '';
            const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
            return weekdays[date.getDay()];
        };

        const formatDateWithDay = (dateStr) => {
            if (!dateStr) return '';
            const formattedDate = dateStr.replace(/-/g, '/');
            const weekday = getWeekday(dateStr);
            return `${formattedDate} (${weekday})`;
        };

        const DEFAULT_CATEGORIES = [
            '消耗品費',
            '旅費交通費',
            '通信費',
            '広告宣伝費',
            '会議費',
            '新聞図書費',
            '支払手数料',
            '地代家賃',
            'その他開業準備費'
        ];

        function App() {
            const [expenses, setExpenses] = useState([]);
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            
            const [isGoogleConnected, setIsGoogleConnected] = useState(() => {
                return getSessionStorageItem('openeer_is_connected', false);
            });
            const [googleToken, setGoogleToken] = useState(() => {
                return getSessionStorageItem('openeer_google_token', null);
            });

            const [isLoading, setIsLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            const [successMsg, setSuccessMsg] = useState(null);

            const [settings, setSettings] = useState(() => {
                return getLocalStorageItem('openeer_settings', {
                    clientId: '',
                    spreadsheetId: '',
                    useGoogleSync: false
                });
            });

            const [activeTab, setActiveTab] = useState('add');
            const [showSettings, setShowSettings] = useState(false);
            const [showCategoryManager, setShowCategoryManager] = useState(false);
            const [showLocalFileHelp, setShowLocalFileHelp] = useState(true);

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                category: DEFAULT_CATEGORIES[0],
                payee: '',
                amount: '',
                description: '',
                noReceipt: false
            });

            const [newCategoryName, setNewCategoryName] = useState('');
            const [filterCategory, setFilterCategory] = useState('ALL');
            const [filterPeriod, setFilterPeriod] = useState('ALL');
            const [filterStartDate, setFilterStartDate] = useState('');
            const [filterEndDate, setFilterEndDate] = useState('');
            const [gisLoaded, setGisLoaded] = useState(false);
            const [gapiLoaded, setGapiLoaded] = useState(false);

            const fileInputRef = useRef(null);

            useEffect(() => {
                const cachedExpenses = getLocalStorageItem('openeer_expenses', []);
                const cachedCategories = getLocalStorageItem('openeer_categories', DEFAULT_CATEGORIES);
                setExpenses(cachedExpenses);
                setCategories(cachedCategories);

                try {
                    const scriptGis = document.createElement('script');
                    scriptGis.src = 'https://accounts.google.com/gsi/client';
                    scriptGis.async = true;
                    scriptGis.defer = true;
                    scriptGis.onload = () => setGisLoaded(true);
                    document.body.appendChild(scriptGis);

                    const scriptGapi = document.createElement('script');
                    scriptGapi.src = 'https://apis.google.com/js/api.js';
                    scriptGapi.async = true;
                    scriptGapi.defer = true;
                    scriptGapi.onload = () => {
                        window.gapi.load('client', async () => {
                            setGapiLoaded(true);
                        });
                    };
                    document.body.appendChild(scriptGapi);
                } catch(e) {
                    console.error("SDK load failed:", e);
                }
            }, []);

            useEffect(() => {
                setLocalStorageItem('openeer_settings', settings);
            }, [settings]);

            const isFileProtocol = window.location.protocol === 'file:';

            const isClientIdInvalid = useMemo(() => {
                if (!settings.clientId) return false;
                const trimmed = settings.clientId.trim();
                return trimmed.includes('@') || !trimmed.endsWith('.apps.googleusercontent.com');
            }, [settings.clientId]);

            function saveToLocalCache(newExpenses, newCategories) {
                if (newExpenses) {
                    setExpenses(newExpenses);
                    setLocalStorageItem('openeer_expenses', newExpenses);
                }
                if (newCategories) {
                    setCategories(newCategories);
                    setLocalStorageItem('openeer_categories', newCategories);
                }
            }

            function handleGoogleLogin() {
                if (isFileProtocol) {
                    setErrorMsg("【Google同期の重要エラー防止】現在デスクトップのHTMLをダブルクリックで直接開いています（file://プロトコル）。この状態のままログインボタンを押すと、Googleのセキュリティ制限により『Error 400: invalid_request (アクセスをブロック)』が必ず発生します。解決するには、設定アイコン(歯車)を開き、オレンジ色の枠内に書かれている「解決マニュアル（ホスティング手順）」に沿って設定を完了してください。");
                    setShowSettings(true);
                    return;
                }

                if (!gisLoaded || !gapiLoaded) {
                    showNotification('Google認証ライブラリの通信を確立中です。数秒待って再試行してください。', 'error');
                    return;
                }
                if (!settings.clientId) {
                    showNotification('設定画面から「Google クライアントID」を入力してください。', 'error');
                    setShowSettings(true);
                    return;
                }
                if (isClientIdInvalid) {
                    showNotification('クライアントIDの設定値が正しくありません。エラー警告を確認してください。', 'error');
                    setShowSettings(true);
                    return;
                }

                setIsLoading(true);
                try {
                    const client = window.google.accounts.oauth2.initTokenClient({
                        client_id: settings.clientId.trim(),
                        scope: 'https://www.googleapis.com/auth/spreadsheets',
                        callback: async (tokenResponse) => {
                            if (tokenResponse.error) {
                                setErrorMsg(`認証エラー: ${tokenResponse.error_description || tokenResponse.error}`);
                                setIsLoading(false);
                                return;
                            }
                            
                            window.gapi.client.setToken({ access_token: tokenResponse.access_token });
                            
                            setGoogleToken(tokenResponse);
                            setIsGoogleConnected(true);
                            setSessionStorageItem('openeer_google_token', tokenResponse);
                            setSessionStorageItem('openeer_is_connected', true);

                            showNotification('Googleアカウントと連携しました！', 'success');
                            if (settings.spreadsheetId) {
                                await syncWithGoogle(tokenResponse.access_token);
                            } else {
                                showNotification('連携用のスプレッドシートIDを設定するか、「新規シートの自動生成」を行ってください。', 'info');
                                setShowSettings(true);
                            }
                            setIsLoading(false);
                        },
                    });
                    client.requestAccessToken({ prompt: 'consent' });
                } catch (err) {
                    setErrorMsg(`ログインプロセスの起動に失敗しました: ${err.message}`);
                    setIsLoading(false);
                }
            }

            // 【完全決着】Google Sheets API v4のGAPI通信エラー（404）を完全に叩き潰すサニタイズ処理を搭載
            async function callSheetsApi(apiEndpointPath, method = 'GET', body = null, token = null) {
                const accessToken = token || googleToken?.access_token;
                if (!accessToken) {
                    throw new Error('Google認証トークンが見つかりません。「設定」アイコンより再度ログイン（再連携）を行ってください。');
                }

                if (accessToken) {
                    window.gapi.client.setToken({ access_token: accessToken });
                }

                // 1. パスのクリーニング（ホスト名や重複プレフィックスを完全に除去して /spreadsheets から始まるように一本化）
                let cleanPath = apiEndpointPath
                    .replace('https://sheets.googleapis.com', '')
                    .replace('/v1', '')
                    .replace('/sheets', '');

                if (!cleanPath.startsWith('/spreadsheets')) {
                    cleanPath = '/spreadsheets' + cleanPath;
                }

                // 2. クエリパラメータ（?valueInputOption=USER_ENTERED等）の自動分離
                let queryParams = {};
                const questionMarkIndex = cleanPath.indexOf('?');
                if (questionMarkIndex !== -1) {
                    const queryString = cleanPath.substring(questionMarkIndex + 1);
                    cleanPath = cleanPath.substring(0, questionMarkIndex);
                    
                    const pairs = queryString.split('&');
                    for (let pair of pairs) {
                        const [key, val] = pair.split('=');
                        if (key) {
                            queryParams[key] = decodeURIComponent(val || '');
                        }
                    }
                }

                // 3. 日本語シート名（マルチバイト非ASCII文字）のみをピンポイントで安全にURLエンコードする最強正規表現
                // これにより、感嘆符「!」や範囲指定のコロン「:」、メソッド命令「:append」を100%安全に保護します
                cleanPath = cleanPath.replace(/[^\x00-\x7F]+/g, (match) => encodeURIComponent(match));

                try {
                    // 4. GAPIライブラリの正しいインターフェースに則り、分離した path, method, params を綺麗に流し込む
                    const response = await window.gapi.client.request({
                        path: `/v4${cleanPath}`,
                        method: method,
                        params: Object.keys(queryParams).length > 0 ? queryParams : undefined,
                        body: body ? body : undefined
                    });
                    return response.result;
                } catch (err) {
                    const errorDetail = err.result?.error?.message || err.message || JSON.stringify(err);
                    throw new Error(`APIセキュア通信エラー: ${errorDetail}`);
                }
            }

            async function handleCreateNewSpreadsheet() {
                if (!isGoogleConnected) {
                    showNotification('まずGoogleアカウントにログインしてください。', 'error');
                    return;
                }
                setIsLoading(true);
                try {
                    const createRes = await callSheetsApi(
                        '/spreadsheets',
                        'POST',
                        {
                            properties: { title: `Openeer_開業準備費管理シート` },
                            sheets: [
                                { properties: { title: '開業費データ' } },
                                { properties: { title: '勘定科目マスター' } }
                            ]
                        }
                    );

                    const newSpreadsheetId = createRes.spreadsheetId;
                    setSettings(prev => ({ ...prev, spreadsheetId: newSpreadsheetId, useGoogleSync: true }));
                    showNotification('Googleスプレッドシートを新規作成しました！', 'success');

                    await callSheetsApi(
                        `/spreadsheets/${newSpreadsheetId}/values/開業費データ!A1:G1?valueInputOption=USER_ENTERED`,
                        'PUT',
                        { values: [['ID', '日付', '勘定科目', '支払先', '金額', '内容', '領収書なし(確認用)']] }
                    );

                    const catValues = categories.map(c => [c]);
                    await callSheetsApi(
                        `/spreadsheets/${newSpreadsheetId}/values/勘定科目マスター!A1:A${categories.length}?valueInputOption=USER_ENTERED`,
                        'PUT',
                        { values: catValues }
                    );

                    showNotification('初期設定がすべて完了しました。以降自動で同期されます。', 'success');
                } catch (err) {
                    setErrorMsg(`スプレッドシート自動生成エラー: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            }

            async function syncWithGoogle(forcedToken = null) {
                const activeToken = forcedToken || googleToken?.access_token;
                if (!activeToken) {
                    showNotification('同期するにはまず「Googleログイン」を行ってください。', 'error');
                    return;
                }
                if (!settings.spreadsheetId) {
                    showNotification('同期先のスプレッドシートIDが未設定です。', 'error');
                    return;
                }

                setIsLoading(true);
                try {
                    const spreadsheetMeta = await callSheetsApi(
                        `/spreadsheets/${settings.spreadsheetId}`,
                        'GET',
                        null,
                        activeToken
                    );

                    const sheetNames = spreadsheetMeta.sheets.map(s => s.properties.title);
                    const sheetsToCreate = [];
                    if (!sheetNames.includes('開業費データ')) sheetsToCreate.push('開業費データ');
                    if (!sheetNames.includes('勘定科目マスター')) sheetsToCreate.push('勘定科目マスター');

                    if (sheetsToCreate.length > 0) {
                        await callSheetsApi(
                            `/spreadsheets/${settings.spreadsheetId}:batchUpdate`,
                            'POST',
                            {
                                requests: sheetsToCreate.map(name => ({
                                    addSheet: { properties: { title: name } }
                                }))
                            },
                            activeToken
                        );
                        if (sheetsToCreate.includes('開業費データ')) {
                            await callSheetsApi(
                                `/spreadsheets/${settings.spreadsheetId}/values/開業費データ!A1:G1?valueInputOption=USER_ENTERED`,
                                    'PUT',
                                { values: [['ID', '日付', '勘定科目', '支払先', '金額', '内容', '領収書なし(確認用)']] },
                                activeToken
                            );
                        }
                    }

                    const dataRes = await callSheetsApi(
                        `/spreadsheets/${settings.spreadsheetId}/values/開業費データ!A2:G10000`,
                        'GET',
                        null,
                        activeToken
                    );
                    
                    const parsedExpenses = [];
                    if (dataRes.values) {
                        dataRes.values.forEach(row => {
                            if (row[0]) {
                                parsedExpenses.push({
                                    id: row[0],
                                    date: row[1] || '',
                                    category: row[2] || '',
                                    payee: row[3] || '',
                                    amount: parseFloat(row[4]) || 0,
                                    description: row[5] || '',
                                    noReceipt: row[6] === 'TRUE'
                                });
                            }
                        });
                    }

                    const catRes = await callSheetsApi(
                        `/spreadsheets/${settings.spreadsheetId}/values/勘定科目マスター!A1:A100`,
                        'GET',
                        null,
                        activeToken
                    );

                    let parsedCategories = DEFAULT_CATEGORIES;
                    if (catRes.values && catRes.values.length > 0) {
                        parsedCategories = catRes.values.map(r => r[0]).filter(Boolean);
                    } else {
                        await callSheetsApi(
                            `/spreadsheets/${settings.spreadsheetId}/values/勘定科目マスター!A1:A${categories.length}?valueInputOption=USER_ENTERED`,
                            'PUT',
                            { values: categories.map(c => [c]) },
                            activeToken
                        );
                    }

                    saveToLocalCache(parsedExpenses, parsedCategories);
                    showNotification('Googleスプレッドシートの最新データを同期完了しました！', 'success');
                } catch (err) {
                    setErrorMsg(`同期に失敗しました: ${err.message}`);
                } finally {
                    setIsLoading(false);
                }
            }

            async function handleAddExpense() {
                if (!formData.amount || isNaN(formData.amount)) {
                    showNotification('有効な金額（数値）を入力してください。', 'error');
                    return;
                }

                const newExpense = {
                    id: generateSafeId(),
                    date: formData.date,
                    category: formData.category,
                    payee: formData.payee || '指定なし',
                    amount: parseFloat(formData.amount),
                    description: formData.description || '',
                    noReceipt: formData.noReceipt
                };

                const updatedExpenses = [newExpense, ...expenses];

                if (settings.useGoogleSync && isGoogleConnected) {
                    setIsLoading(true);
                    try {
                        const rowData = [
                            newExpense.id,
                            newExpense.date,
                            newExpense.category,
                            newExpense.payee,
                            newExpense.amount,
                            newExpense.description,
                            newExpense.noReceipt ? 'TRUE' : 'FALSE'
                        ];

                        await callSheetsApi(
                            `/spreadsheets/${settings.spreadsheetId}/values/開業費データ!A2:append?valueInputOption=USER_ENTERED`,
                            'POST',
                            { values: [rowData] }
                        );

                        saveToLocalCache(updatedExpenses, null);
                        showNotification('スプレッドシートに正常に保存・追加しました！', 'success');
                        resetForm();
                        setActiveTab('list');
                    } catch (err) {
                        setErrorMsg(`Google保存エラー: ${err.message}。ローカルのみに保存されました。`);
                        saveToLocalCache(updatedExpenses, null);
                        resetForm();
                    } finally {
                        setIsLoading(false);
                    }
                } else {
                    saveToLocalCache(updatedExpenses, null);
                    showNotification('ローカルストレージへ保存しました（Google同期オフ）。', 'success');
                    resetForm();
                    setActiveTab('list');
                }
            }

            async function handleToggleNoReceipt(id, currentVal) {
                const updatedExpenses = expenses.map(item => {
                    if (item.id === id) {
                        return { ...item, noReceipt: !currentVal };
                    }
                    return item;
                });

                saveToLocalCache(updatedExpenses, null);

                if (settings.useGoogleSync && isGoogleConnected) {
                    try {
                        const dataRes = await callSheetsApi(
                            `/spreadsheets/${settings.spreadsheetId}/values/開業費データ!A1:A10000`,
                            'GET'
                        );
                        
                        let rowIndex = -1;
                        if (dataRes.values) {
                            rowIndex = dataRes.values.findIndex(row => row[0] === id) + 1;

                        if (rowIndex > 1) {
                            await callSheetsApi(

                                'PUT',

                        setErrorMsg(`チェック状態の同期に失敗しました: ${err.message}`);

            async function handleAddCategory() {

                if (categories.includes(newCategoryName.trim())) {

            async function handleDeleteCategory(catToDelete) {
                if (categories.length <= 1) {

                    return;

                const updatedCategories = categories.filter(c => c !== catToDelete);

            const filteredExpenses = useMemo(() => {
                const filtered = expenses.filter(item => {
                    if (filterCategory !== 'ALL' && item.category !== filterCategory) return false;
                    if (filterPeriod !== 'ALL') {
                        const itemDate = new Date(item.date.replace(/-/g, '/'));
                        const today = new Date();

                        if (filterPeriod === '30') {
                            const limitDate = new Date();
                            limitDate.setDate(today.getDate() - 30);
                            if (itemDate < limitDate) return false;
                        } else if (filterPeriod === '90') {
                            const limitDate = new Date();
                            limitDate.setDate(today.getDate() - 90);
                            if (itemDate < limitDate) return false;
                        } else if (filterPeriod === 'YTD') {
                            const currentYearStart = new Date(today.getFullYear(), 0, 1);
                            if (itemDate < currentYearStart) return false;
                        } else if (filterPeriod === 'CUSTOM') {
                            if (filterStartDate && itemDate < new Date(filterStartDate.replace(/-/g, '/'))) return false;
                            if (filterEndDate && itemDate > new Date(filterEndDate.replace(/-/g, '/'))) return false;
                        }
                    }
                    return true;
                });

                return filtered.sort((a, b) => {
                    const dateA = new Date(a.date.replace(/-/g, '/'));
                    const dateB = new Date(b.date.replace(/-/g, '/'));
                    return dateA - dateB;
                });
            }, [expenses, filterCategory, filterPeriod, filterStartDate, filterEndDate]);

            const totalAmount = useMemo(() => {
                return filteredExpenses.reduce((sum, item) => sum + item.amount, 0);
            }, [filteredExpenses]);

            const noReceiptCount = useMemo(() => {
                return filteredExpenses.filter(item => item.noReceipt).length;
            }, [filteredExpenses]);

            function handleExportCSV() {
                if (filteredExpenses.length === 0) {
                    showNotification('エクスポートするデータがありません。', 'error');
                    return;
                }

                const headers = ['日付', '勘定科目', '支払先', '金額(税込)', '内容', '領収書なし'];
                const rows = filteredExpenses.map(item => [
                    item.date,
                    item.category,
                    item.payee,
                    item.amount,
                    item.description.replace(/"/g, '""'),
                    item.noReceipt ? 'あり' : 'なし'
                ]);

                const csvContent = "\uFEFF" + [headers.join(','), ...rows.map(e => e.map(val => `"${val}"`).join(','))].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `開業費プールデータ_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showNotification('CSVを正常にエクスポートしました！', 'success');
            }

            function handleImportCSV(event) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        let text = e.target.result;
                        if (text.startsWith('\uFEFF')) {
                            text = text.substring(1);
                        }

                        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
                        if (lines.length < 2) {
                            showNotification('有効なCSVデータがありません。', 'error');
                            return;
                        }

                        const parseCSVLine = (lineText) => {
                            let parts = [];
                            let current = "";
                            let inQuotes = false;
                            for (let i = 0; i < lineText.length; i++) {
                                let char = lineText.charAt(i);
                                if (char === '"') {
                                    inQuotes = !inQuotes;
                                } else if (char === ',' && !inQuotes) {
                                    parts.push(current.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
                                    current = "";
                                } else {
                                    current += char;
                                }
                            }
                            parts.push(current.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
                            return parts;
                        };

                        const headerParts = parseCSVLine(lines[0]);
                        if (headerParts[0] !== '日付' || headerParts[1] !== '勘定科目' || headerParts[3] !== '金額(税込)') {
                            showNotification('CSVのヘッダー形式が一致しません。OpeneerからエクスポートしたCSVをご使用ください。', 'error');
                            return;
                        }

                        const importedExpenses = [];
                        for (let i = 1; i < lines.length; i++) {
                            const row = parseCSVLine(lines[i]);
                            if (row.length >= 5) {
                                importedExpenses.push({
                                    id: generateSafeId(),
                                    date: row[0].replace(/\//g, '-'),
                                    category: row[1] || 'その他開業準備費',
                                    payee: row[2] || '指定なし',
                                    amount: parseFloat(row[3]) || 0,
                                    description: row[4] || '',
                                    noReceipt: row[5] === 'あり'
                                });
                            }
                        }

                        if (importedExpenses.length === 0) {
                            showNotification('インポート可能な経費データがありませんでした。', 'error');
                            return;
                        }

                        saveToLocalCache(importedExpenses, null);
                        showNotification(`CSVから ${importedExpenses.length} 件の開業費データを完全に復元しました！`, 'success');
                        if (fileInputRef.current) fileInputRef.current.value = "";
                    } catch (err) {
                        setErrorMsg(`CSVのパースに失敗しました: ${err.message}`);
                    }
                };
                reader.readAsText(file, "UTF-8");
            }

                                            value={settings.clientId}
                                            onChange={(e) => setSettings({ ...settings, clientId: e.target.value })}
                                            className={`w-full bg-slate-950 border rounded-xl py-2 px-3 text-xs font-mono focus:outline-none focus:border-emerald-500 text-slate-200 ${
                                                isClientIdInvalid ? 'border-rose-500 focus:border-rose-500' : 'border-slate-800'
                                            }`}
                                        />
                                        
                                        {isClientIdInvalid && (
                                            <div className="bg-rose-950/30 border border-rose-900/50 p-2.5 rounded-lg text-[11px] text-rose-300 font-semibold flex items-start space-x-1.5 animate-fadeIn">
                                                <SVGIcon name="AlertCircle" className="w-4 h-4 text-rose-400 flex-shrink-0 mt-0.5" />
                                                <span>
                                                    設定値にメールアドレス（@など）が入力されています。<br />
                                                    Google Cloud Consoleで取得した「<strong>.apps.googleusercontent.com</strong>」で終わる形式の<strong>クライアントID</strong>を入力してください。
                                                </span>
                                            </div>
                                        )}
                                        
                                        <p className="text-[10px] text-slate-500">
                                            ※ Google Cloud Console上でご自身で発行したクライアントIDをご指定ください。
                                        </p>
                                    </div>

                                    <div className="space-y-1.5">
                                        <label className="text-xs font-semibold text-slate-400 block">Google スプレッドシートID</label>
                                        <input
                                            type="text"
                                            placeholder="スプレッドシートID、またはブラウザのURLを貼り付け"
                                            value={settings.spreadsheetId}
                                            onChange={(e) => {
                                                let val = e.target.value;
                                                const match = val.match(/\/d\/([a-zA-Z0-9-_]+)/);
                                                if (match) val = match[1];
                                                setSettings({ ...settings, spreadsheetId: val });
                                            }}
                                            className="w-full bg-slate-900 border border-slate-700 rounded-xl py-2 px-3 text-xs font-mono focus:outline-none focus:border-emerald-500 text-slate-200"
                                        />
                                        <p className="text-[10px] text-slate-500">
                                            ※ URLをまるごと貼り付けても自動でIDを抽出します。
                                        </p>
                                    </div>

                                    <div className="flex items-center justify-between p-3 bg-slate-950/40 border border-slate-800 rounded-xl">
                                        <div>
                                            <span className="font-bold text-xs text-slate-200 block">Googleスプレッドシート同期をオンにする</span>
                                            <span className="text-[10px] text-slate-500">オフ時はお使いの端末ブラウザ内部にのみ安全に保存されます。</span>
                                        </div>
                                        <input
                                            type="checkbox"
                                            checked={settings.useGoogleSync}
                                            onChange={(e) => setSettings({ ...settings, useGoogleSync: e.target.checked })}
                                            className="w-4.5 h-4.5 rounded text-emerald-500 bg-slate-950 border-slate-800 cursor-pointer"
                                        />
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 pt-2">
                                        <button
                                            type="button"
                                            onClick={handleGoogleLogin}
                                            className={`flex items-center justify-center space-x-1.5 py-2.5 px-3 rounded-xl text-xs font-bold transition-all border ${
                                                isGoogleConnected 
                                                    ? 'bg-emerald-950 border-emerald-800 text-emerald-400' 
                                                    : 'bg-emerald-500 border-transparent text-slate-950 hover:bg-emerald-400'
                                            }`}
                                        >
                                            <SVGIcon name="CloudLightning" className="w-4 h-4" />
                                            <span>{isGoogleConnected ? 'Google認証済み' : 'Googleアカウントと連携'}</span>
                                        </button>

                                        <button
                                            type="button"
                                            onClick={handleCreateNewSpreadsheet}
                                            disabled={!isGoogleConnected || isLoading}
                                            className="flex items-center justify-center space-x-1.5 bg-slate-800 border border-slate-700 hover:bg-slate-700 disabled:bg-slate-950 disabled:border-slate-900 disabled:text-slate-600 py-2.5 px-3 rounded-xl text-xs font-bold text-slate-200 transition-colors"
                                        >
                                            <SVGIcon name="FileSpreadsheet" className="w-4 h-4" />
                                            <span>新規シートを自動生成</span>
                                        </button>
                                    </div>
                                </div>

                                <div className="pt-3 border-t border-slate-800 text-right">
                                    <button
                                        onClick={() => setShowSettings(false)}
                                        className="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-xl text-xs font-bold"
                                    >
                                        閉じる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Category Manager Modal */}
                    {showCategoryManager && (
                        <div className="fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-800 w-full max-w-md rounded-2xl p-6 space-y-4 shadow-2xl">
                                <div className="flex items-center justify-between pb-3 border-b border-slate-800">
                                    <h3 className="text-lg font-bold text-slate-100 flex items-center space-x-2">
                                        <SVGIcon name="Folder" className="w-5 h-5 text-emerald-400" />
                                        <span>勘定科目のカスタマイズ</span>
                                    </h3>
                                    <button onClick={() => setShowCategoryManager(false)} className="text-slate-400 hover:text-slate-100 p-1">
                                        <SVGIcon name="X" className="w-5 h-5" />
                                    </button>
                                </div>

                                <div className="space-y-1.5">
                                    <label className="text-xs font-semibold text-slate-400 block">新しく追加する科目名</label>
                                    <div className="flex space-x-2">
                                        <input
                                            type="text"
                                            placeholder="例：支払家賃、交際費、車両費"
                                            value={newCategoryName}
                                            onChange={(e) => setNewCategoryName(e.target.value)}
                                            className="flex-1 bg-slate-950 border border-slate-800 rounded-xl py-2 px-3 text-xs focus:outline-none focus:border-emerald-500 text-slate-200"
                                        />
                                        <button
                                            type="button"
                                            onClick={handleAddCategory}
                                            disabled={isLoading}
                                            className="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold px-4 rounded-xl text-xs flex items-center space-x-1"
                                        >
                                            <SVGIcon name="Plus" className="w-4 h-4" />
                                            <span>追加</span>
                                        </button>
                                    </div>
                                </div>

                                <div className="space-y-2">
                                    <label className="text-xs font-semibold text-slate-400 block">登録中の勘定科目</label>
                                    <div className="bg-slate-950/40 border border-slate-800 p-2.5 rounded-xl max-h-60 overflow-y-auto space-y-1.5 divide-y divide-slate-900">
                                        {categories.map((cat, idx) => (
                                            <div key={idx} className="flex justify-between items-center text-xs py-2 px-1.5">
                                                <span className="text-slate-200 font-medium">{cat}</span>
                                                <button
                                                    type="button"
                                                    onClick={() => handleDeleteCategory(cat)}
                                                    disabled={isLoading}
                                                    className="text-slate-500 hover:text-rose-400 p-1 rounded transition-colors"
                                                >
                                                    <SVGIcon name="Trash2" className="w-3.5 h-3.5" />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="pt-3 border-t border-slate-800 flex justify-between items-center">
                                    <p className="text-[10px] text-slate-500">※ 同期有効時は即時にクラウド変更されます。</p>
                                    <button
                                        type="button"
                                        onClick={() => setShowCategoryManager(false)}
                                        className="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-xl text-xs font-bold"
                                    >
                                        閉じる
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="border-t border-slate-800 bg-slate-950 py-4 px-4 text-center text-xs text-slate-500 mt-auto">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-2">
                            <p>© 2026 Openeer - 開業費プールマネージャー. All Rights Reserved.</p>
                            <p className="text-[10px] text-slate-600">フロントエンドOAuth2認証 / Google Sheets API 直接連携</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
